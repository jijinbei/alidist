name: Nix Build & Cache
on:
  push:
    branches: [master]
    paths: ['flake.nix', 'flake.lock', 'nix/**']
  pull_request:
    paths: ['flake.nix', 'flake.lock', 'nix/**']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: alice-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Flake check
        run: nix flake check

      - name: Build ROOT
        run: nix build .#root --print-build-logs

      - name: Build Layer 2
        run: |
          nix build .#fairroot --print-build-logs
          nix build .#geant4 --print-build-logs

      # O2/O2Physics require 16GB+ RAM — on GitHub-hosted runners they
      # rely on cache hits from local `cachix push`.
      - name: Build O2
        run: nix build .#o2 --print-build-logs

      - name: Build O2Physics
        run: nix build .#o2physics --print-build-logs

      - name: Test devShell
        run: nix develop .#o2physics --command bash -c 'echo OK'
