name: Nix Build & Cache
on:
  push:
    branches: [master]
    paths: ['flake.nix', 'flake.lock', 'nix/**']
  pull_request:
    paths: ['flake.nix', 'flake.lock', 'nix/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: alice-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Flake check
        run: nix flake check

      # Layer 1: ROOT (largest dependency, cache first)
      - name: Build ROOT
        run: nix build .#root --print-build-logs

      # Layer 2: key packages
      - name: Build Layer 2
        run: |
          nix build .#fairroot --print-build-logs
          nix build .#geant4 --print-build-logs

      # Layer 3: O2 and O2Physics
      # These require 16GB+ RAM — on ubuntu-latest (7GB) they rely on
      # cache hits from local `cachix push`. With a self-hosted runner
      # that has enough memory, uncomment --print-build-logs to build
      # from source.
      - name: Build O2 (cache-only on default runner)
        run: nix build .#o2 --print-build-logs

      - name: Build O2Physics (cache-only on default runner)
        run: nix build .#o2physics --print-build-logs

      # Smoke-test the dev shell
      - name: Test devShell
        run: nix develop .#o2physics --command bash -c 'echo OK'
